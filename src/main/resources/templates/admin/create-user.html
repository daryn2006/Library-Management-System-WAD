<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create User</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="card">
    <h1>Create User</h1>

    <p class="msg error" th:if="${error}" th:text="${error}"></p>

    <form method="post" th:action="@{/admin/create}" th:object="${userForm}">
        <label>
            Username
            <input type="text" th:field="*{username}" required>
        </label>
        <p class="msg error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>
        <label>
            Password
            <input type="password" th:field="*{password}" required>
        </label>
        <p class="msg error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
        <input type="hidden" th:field="*{role}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit">Create</button>
    </form>

    <p class="muted">New admin-created accounts default to reader role.</p>
    <p><a th:href="@{/admin/users}">Back to users</a></p>
</main>
</body>
</html>
