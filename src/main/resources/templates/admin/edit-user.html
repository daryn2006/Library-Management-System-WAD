<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="card">
    <h1>Edit User</h1>

    <p class="msg error" th:if="${error}" th:text="${error}"></p>

    <form method="post" th:action="@{/admin/edit}" th:object="${userForm}">
        <input type="hidden" th:field="*{id}">
        <label>
            Username
            <input type="text" th:field="*{username}" required>
        </label>
        <p class="msg error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>
        <label>
            New password (leave blank to keep current)
            <input type="password" th:field="*{password}">
        </label>
        <p class="msg error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
        <label>
            Role
            <select th:field="*{role}">
                <option value="USER">USER</option>
                <option value="ADMIN">ADMIN</option>
            </select>
        </label>
        <p class="msg error" th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></p>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit">Save</button>
    </form>

    <p><a th:href="@{/admin/users}">Back to users</a></p>
</main>
</body>
</html>
